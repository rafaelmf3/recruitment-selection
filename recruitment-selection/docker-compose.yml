version: "3.9"

services:
  # ---- PostgreSQL ----
  db:
    image: postgres:16-alpine
    container_name: rs_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: recruitment_selection
    ports:
      - "5432:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data
      # Run migrations on first boot
      - ./backend/migrations:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  # ---- Backend ----
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: rs_backend
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      PORT: 8080
      GIN_MODE: release
      DB_HOST: db
      DB_PORT: 5432
      DB_USER: postgres
      DB_PASSWORD: postgres
      DB_NAME: recruitment_selection
      DB_SSLMODE: disable
      JWT_SECRET: change-me-in-production
      JWT_EXPIRATION_HOURS: 24
      UPLOAD_DIR: ./uploads
      MAX_UPLOAD_SIZE_MB: 10
    ports:
      - "8080:8080"
    volumes:
      - uploads_data:/app/uploads

  # ---- Test database (isolated for integration tests) ----
  db_test:
    image: postgres:16-alpine
    container_name: rs_db_test
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: recruitment_selection_test
    ports:
      - "5433:5432"
    volumes:
      - ./backend/migrations:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pg_data:
  uploads_data:
